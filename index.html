      <h1>EthUX — Ethereum UX Pain Points, Solutions & Research</h1>
      <p>A community-sourced map of 38 Ethereum UX pain points with real user evidence, solution checklists, and adoption tracking. Built from 32,000+ community reports.</p>

      <p><strong>For AI agents and LLM tools:</strong> the index lives at <a href="/llms.txt">/llms.txt</a>, with the full dataset at <a href="/llms-full.txt">/llms-full.txt</a> and structured JSON at <a href="/api/data.json">/api/data.json</a>.</p>

      <h2>UX Problem Categories</h2>
      <ul>
        <li><strong>User Onboarding</strong> — Make the first 5 minutes effortless. 5 problems including the gas hurdle, recovery phrase friction, and jargon overload.</li>
        <li><strong>Transaction Clarity</strong> — Help users understand every transaction. 7 problems including blind signing, signing fatigue, and redundant approvals.</li>
        <li><strong>Cross-chain Flow</strong> — Make moving between chains invisible. 4 problems including bridging pain, asset fragmentation, and manual network switching.</li>
        <li><strong>Safety & Security</strong> — Build trust through transparency and user control. 3 problems including scam prevalence, key management burden, and spam tokens.</li>
        <li><strong>Mobile & Connectivity</strong> — Bring wallet connection up to mobile standards. 3 problems including the mobile connection dance and dropped sessions.</li>
        <li><strong>Accessibility</strong> — Open the door for 75% of non-English speakers. 3 problems including jargon overload, assumed user knowledge, and poor localization.</li>
        <li><strong>Protocol Design</strong> — Unlock better UX at the protocol layer. 2 problems including no default native account abstraction and public-by-default activity.</li>
        <li><strong>Daily Operations</strong> — Polish the flows people use every day. 5 problems including unpredictable gas fees, missing fiat values, and NFT display failures.</li>
      </ul>

      <h2>Builder Checklists</h2>
      <ul>
        <li><strong>Token Approvals</strong> — Permit2, EIP-5792, exact-amount approvals (5 patterns)</li>
        <li><strong>Transaction Signing</strong> — EIP-712, simulation, SIWE (5 patterns)</li>
        <li><strong>Gas & Fees</strong> — Paymasters, fiat display, ERC-20 gas payment (5 patterns)</li>
        <li><strong>Multi-Chain</strong> — Cross-chain intents, unified balances (5 patterns)</li>
        <li><strong>Onboarding</strong> — Progressive disclosure, jargon replacement, i18n (6 patterns)</li>
        <li><strong>Wallet Connection</strong> — EIP-6963 discovery, deep linking (5 patterns)</li>
        <li><strong>Safety & Security</strong> — Risk-tiered warnings, ENS, spam filtering (5 patterns)</li>
      </ul>
